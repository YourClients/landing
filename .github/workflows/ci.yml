name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: deploy-ycliend-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_HOST: 91.207.75.72
  DEPLOY_PATH: /opt/ycliend-landing
  WEB_ROOT: /var/www/ycliend.antonbutov.com
  SITE_DOMAIN: ycliend.antonbutov.com

jobs:
  check:
    name: Check landing files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify landing
        run: |
          test -f index.html
          test -f css/styles.css
          test -f js/main.js
          test -d assets
          echo "Landing OK"

  deploy:
    name: Deploy to ycliend.antonbutov.com
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify deploy secrets
        env:
          KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          USER_NAME: ${{ secrets.DEPLOY_USER }}
        run: |
          test -n "$KEY" || { echo "Add repository secret DEPLOY_SSH_PRIVATE_KEY"; exit 1; }
          test -n "$USER_NAME" || { echo "Add repository secret DEPLOY_USER"; exit 1; }

      - name: Load SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_ed25519
          chmod 600 ~/.ssh/deploy_ed25519
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Prepare directories on server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i "$HOME/.ssh/deploy_ed25519" -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p ${DEPLOY_PATH} ${WEB_ROOT}"

      - name: Rsync static site
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -avz --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'deploy/' \
            --exclude 'README.md' \
            --exclude '.gitignore' \
            -e "ssh -i $HOME/.ssh/deploy_ed25519 -o IdentitiesOnly=yes" \
            ./ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${WEB_ROOT}/"

      - name: Rsync nginx config and install script
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -avz \
            -e "ssh -i $HOME/.ssh/deploy_ed25519 -o IdentitiesOnly=yes" \
            deploy/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Install nginx site and TLS
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
        run: |
          ssh -i "$HOME/.ssh/deploy_ed25519" -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "chmod +x ${DEPLOY_PATH}/install-nginx.sh && \
             DEPLOY_PATH='${DEPLOY_PATH}' SITE_DOMAIN='${SITE_DOMAIN}' WEB_ROOT='${WEB_ROOT}' \
             CERTBOT_EMAIL='${CERTBOT_EMAIL:-mail@antonbutov.com}' \
             ${DEPLOY_PATH}/install-nginx.sh"

      - name: Smoke test
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i "$HOME/.ssh/deploy_ed25519" -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "curl -fsS https://${SITE_DOMAIN}/ | head -c 500" \
          || ssh -i "$HOME/.ssh/deploy_ed25519" -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "curl -fsS http://127.0.0.1/ -H 'Host: ${SITE_DOMAIN}' | head -c 500; nginx -t"
