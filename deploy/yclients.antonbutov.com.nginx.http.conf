# yclients.antonbutov.com — HTTP only (before TLS cert exists)

server {
    listen 80;
    listen [::]:80;
    server_name yclients.antonbutov.com;

    root /var/www/yclients.antonbutov.com;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# redirect typo domain if DNS was pointed at ycliend
server {
    listen 80;
    listen [::]:80;
    server_name ycliend.antonbutov.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 http://yclients.antonbutov.com$request_uri;
    }
}
